test_cases:
  - id: TC001
    name: 登录成功
    priority: P0
    status: 已发布
    steps:
      - 打开登录页面
      - 输入用户名和密码
      - 点击登录按钮
    expected: 登录成功，跳转到首页
    tags:
      - 登录
      - 正向场景
    description: 验证用户使用正确的用户名和密码可以成功登录
    preconditions: 用户已注册
    author: QA Team

  - id: TC002
    name: 登录失败-密码错误
    priority: P1
    status: 已发布
    steps:
      - 打开登录页面
      - 输入用户名和错误密码
      - 点击登录按钮
    expected: 提示密码错误，停留在登录页
    tags:
      - 登录
      - 异常场景
    description: 验证用户使用错误的密码登录会失败
    preconditions: 用户已注册
    author: QA Team

  - id: TC003
    name: 忘记密码
    priority: P2
    status: 草稿
    steps:
      - 点击忘记密码链接
      - 输入注册邮箱
      - 点击发送重置链接
    expected: 提示重置链接已发送
    tags:
      - 登录
      - 密码重置
    author: QA Team
