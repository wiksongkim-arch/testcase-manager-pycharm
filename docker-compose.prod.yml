version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: testcase-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-testcase}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-testcase_manager}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testcase-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-testcase}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: testcase-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - testcase-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # API 服务
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    container_name: testcase-api
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgres://${DB_USER:-testcase}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-testcase_manager}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      GIT_STORAGE_PATH: /data/git-repos
    volumes:
      - git_repos:/data/git-repos
    networks:
      - testcase-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Web 前端
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: testcase-web
    ports:
      - "${WEB_PORT:-80}:80"
    networks:
      - testcase-network
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  git_repos:

networks:
  testcase-network:
    driver: bridge
